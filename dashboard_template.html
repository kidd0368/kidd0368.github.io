<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>韓國股市去槓桿壓力儀表板</title>
<style>
:root, [data-theme="light"] {
  --surface-1:#fcfcfb; --page:#f9f9f7;
  --ink-1:#0b0b0b; --ink-2:#52514e; --ink-3:#898781;
  --grid:#e1e0d9; --axis:#c3c2b7; --ring:rgba(11,11,11,.10);
  --s1:#2a78d6; --s2:#1baf7a; --s3:#eda100; --s4:#008300; --s5:#4a3aa7; --s6:#e34948;
  --good:#0ca30c; --warn:#fab219; --serious:#ec835a; --crit:#d03b3b;
  --wash:rgba(11,11,11,.045);
}
[data-theme="dark"] {
  --surface-1:#1a1a19; --page:#0d0d0d;
  --ink-1:#ffffff; --ink-2:#c3c2b7; --ink-3:#898781;
  --grid:#2c2c2a; --axis:#383835; --ring:rgba(255,255,255,.10);
  --s1:#3987e5; --s2:#199e70; --s3:#c98500; --s4:#008300; --s5:#9085e9; --s6:#e66767;
  --wash:rgba(255,255,255,.06);
}
* { box-sizing:border-box; }
html,body { margin:0; padding:0; background:var(--page); color:var(--ink-1);
  font-family:system-ui,-apple-system,"Segoe UI","Noto Sans TC","Microsoft JhengHei",sans-serif;
  font-size:14px; line-height:1.55; }
.wrap { max-width:1180px; margin:0 auto; padding:20px 16px 56px; }
header.top { display:flex; flex-wrap:wrap; align-items:center; gap:8px 14px; margin-bottom:6px; }
header.top .brand { height:30px; width:auto; display:block; }
[data-theme="dark"] header.top .brand { filter:invert(1) hue-rotate(195deg) saturate(.85) brightness(1.08); }
header.top h1 { font-size:20px; font-weight:700; margin:0; }
.sub { color:var(--ink-3); font-size:12.5px; }
.spacer { flex:1; }
button.ghost { background:none; border:1px solid var(--ring); border-radius:8px; color:var(--ink-2);
  padding:4px 10px; font-size:12px; cursor:pointer; white-space:nowrap; flex:none; }
button.ghost:hover { background:var(--wash); }
.hero { display:grid; grid-template-columns:290px 1fr; gap:14px; margin:14px 0; }
@media (max-width:860px){ .hero { grid-template-columns:1fr; } }
.card { background:var(--surface-1); border:1px solid var(--ring); border-radius:14px; padding:16px 18px; }
.gauge-card { display:flex; flex-direction:column; align-items:center; }
.tiles { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; }
.tile .lbl { color:var(--ink-2); font-size:12.5px; }
.tile .val { font-size:26px; font-weight:600; margin-top:2px; }
.tile .delta { font-size:12px; margin-top:2px; color:var(--ink-3); }
.delta .up-bad { color:var(--crit); } .delta .down-good { color:var(--s4); }
.chips { display:flex; flex-wrap:wrap; gap:8px; margin:2px 0 14px; }
.chip { display:flex; align-items:center; gap:7px; border:1px solid var(--ring); border-radius:999px;
  padding:5px 12px; font-size:12.5px; color:var(--ink-2); background:var(--surface-1); }
.chip b { color:var(--ink-1); font-weight:600; }
.dot { width:9px; height:9px; border-radius:50%; flex:none; }
.filters { display:flex; align-items:center; gap:6px; margin:4px 0 12px; flex-wrap:wrap; }
.filters .fl { color:var(--ink-3); font-size:12px; margin-right:2px; }
.filters button { background:none; border:1px solid var(--ring); color:var(--ink-2); border-radius:8px;
  padding:4px 12px; font-size:12.5px; cursor:pointer; }
.filters button.on { background:var(--wash); color:var(--ink-1); font-weight:600; border-color:var(--axis); }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
@media (max-width:960px){ .grid { grid-template-columns:1fr; } }
.card h3 { margin:0 0 2px; font-size:14.5px; font-weight:700; display:flex; align-items:center; gap:8px; }
.card .desc { color:var(--ink-3); font-size:12px; margin-bottom:8px; }
.card .hd { display:flex; align-items:flex-start; }
.card .hd .spacer { flex:1; }
.legend { display:flex; flex-wrap:wrap; gap:4px 14px; margin-top:6px; font-size:12px; color:var(--ink-2); }
.legend .key { display:flex; align-items:center; gap:6px; }
.key .sw { width:10px; height:10px; border-radius:3px; }
.key .ln { width:14px; height:2px; border-radius:1px; }
.fn { color:var(--ink-3); font-size:11.5px; margin-top:8px; }
svg text { font-family:inherit; }
.tick { fill:var(--ink-3); font-size:10.5px; font-variant-numeric:tabular-nums; }
.dlabel { fill:var(--ink-2); font-size:11px; font-weight:600; }
.tooltip { position:fixed; pointer-events:none; background:var(--surface-1); border:1px solid var(--ring);
  border-radius:10px; padding:8px 11px; font-size:12px; box-shadow:0 4px 14px rgba(0,0,0,.14);
  z-index:50; display:none; max-width:260px; }
.tooltip .tt-d { color:var(--ink-3); margin-bottom:3px; font-size:11.5px; }
.tooltip .row { display:flex; align-items:center; gap:6px; margin-top:2px; }
.tooltip .row .v { margin-left:auto; font-weight:600; font-variant-numeric:tabular-nums; padding-left:10px; }
.tblwrap { max-height:300px; overflow:auto; margin-top:6px; border:1px solid var(--ring); border-radius:8px; }
table.tv { border-collapse:collapse; width:100%; font-size:12px; }
table.tv th, table.tv td { padding:4px 9px; text-align:right; border-bottom:1px solid var(--grid);
  font-variant-numeric:tabular-nums; white-space:nowrap; }
table.tv th:first-child, table.tv td:first-child { text-align:left; position:sticky; left:0; background:var(--surface-1); }
table.tv thead th { position:sticky; top:0; background:var(--surface-1); color:var(--ink-2); z-index:2; }
.unwind { margin-top:10px; }
.unwind .bar { height:10px; border-radius:5px; background:var(--wash); position:relative; overflow:hidden; }
.unwind .fill { position:absolute; inset:0 auto 0 0; background:var(--s1); border-radius:5px; }
.unwind .cap { display:flex; justify-content:space-between; font-size:11.5px; color:var(--ink-3); margin-top:4px; }
.parts .row { display:flex; align-items:center; gap:10px; margin:7px 0; }
.parts .nm { width:190px; font-size:12px; color:var(--ink-2); flex:none; }
.parts .bar { flex:1; height:12px; background:var(--wash); border-radius:6px; position:relative; }
.parts .bf { position:absolute; inset:0 auto 0 0; background:var(--s1); border-radius:6px; }
.parts .pv { width:70px; text-align:right; font-size:12px; font-variant-numeric:tabular-nums; color:var(--ink-2); flex:none; }
.pending { border:1px dashed var(--axis); border-radius:10px; padding:12px 14px; color:var(--ink-2); font-size:12.5px; background:var(--wash); }
.method { font-size:12.5px; color:var(--ink-2); }
.method h4 { margin:14px 0 4px; font-size:13px; color:var(--ink-1); }
.method code { background:var(--wash); border-radius:4px; padding:1px 5px; font-size:11.5px; }
details.how { margin:2px 0 8px; }
details.how summary { cursor:pointer; font-size:12px; color:var(--s1); user-select:none; list-style:none; }
details.how summary::before { content:'▸ '; }
details.how[open] summary::before { content:'▾ '; }
details.how .hb { margin-top:6px; padding:9px 12px; background:var(--wash); border-radius:9px;
  font-size:12.5px; color:var(--ink-2); line-height:1.65; }
#commentary p { margin:7px 0; font-size:13.5px; line-height:1.75; }
.stages { display:flex; gap:8px; margin:2px 0 12px; }
.stages .st { flex:1; padding:8px 12px; border-radius:9px; border:1px solid var(--ring); font-size:12px; color:var(--ink-3); background:var(--surface-1); }
.stages .st b { display:block; font-size:12.5px; color:var(--ink-3); }
.stages .st.on { background:var(--wash); border-color:var(--axis); color:var(--ink-2); }
.stages .st.on b { color:var(--ink-1); }
@media (max-width:700px){ .stages { flex-direction:column; } }
#verdict { margin:4px 0 14px; padding:12px 16px; background:var(--wash); border-radius:11px; border-left:4px solid var(--s1); }
#verdict:empty { display:none; }
#verdict .v0 { font-size:11.5px; letter-spacing:.06em; color:var(--ink-3); margin-bottom:4px; }
#verdict .v1 { font-size:14.5px; font-weight:650; line-height:1.7; }
#verdict .v2 { font-size:12.5px; color:var(--ink-2); margin-top:6px; line-height:1.65; }
#commentary .tag { display:inline-block; font-size:11px; color:var(--ink-3); border:1px solid var(--ring);
  border-radius:5px; padding:0 6px; margin-right:8px; vertical-align:1px; }
footer { color:var(--ink-3); font-size:11.5px; margin-top:22px; }
a { color:var(--s1); text-decoration:none; }
.zone-good { color:var(--good); } .zone-warn { color:var(--warn); }
.zone-serious { color:var(--serious); } .zone-crit { color:var(--crit); }
</style>
</head>

<script>
const IND = /*__DATA__*/null;
(function(){
if(!IND){ document.getElementById('app').innerHTML='<p style="padding:40px">尚無數據 — 請先執行數據管線。</p>'; return; }

/* ---------- helpers ---------- */
const $ = s=>document.querySelector(s);
const el=(t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;};
const fmtD=d=>d? d.slice(0,4)+'/'+d.slice(4,6)+'/'+d.slice(6,8):'';
const fmtN=(v,dp=1)=>v==null?'–':Number(v).toLocaleString('en-US',{minimumFractionDigits:dp,maximumFractionDigits:dp});
const css=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();

/* theme */
const saved=null; let theme=(matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';
document.documentElement.setAttribute('data-theme',theme);
$('#themeBtn').onclick=()=>{theme=theme==='light'?'dark':'light';document.documentElement.setAttribute('data-theme',theme);renderAll();};
if(matchMedia){ matchMedia('(prefers-color-scheme: dark)').addEventListener('change',e=>{theme=e.matches?'dark':'light';document.documentElement.setAttribute('data-theme',theme);renderAll();}); }

/* ---------- header ---------- */
$('#asof').textContent='行情截至 '+fmtD(IND.asof_market||IND.asof)+'｜信用/資金截至 '+fmtD(IND.asof_credit||IND.asof)+'（KOFIA T+1 公布）';
$('#genline').textContent='共 '+IND.n_days_total.toLocaleString()+' 個交易日 · 產出於 '+IND.generated;
if(IND.sample){ const b=el('div',null,'⚠️ 目前顯示<b>管線測試用合成數據</b>（僅末日錨點對齊真實值）— 待 KOFIA 真實歷史數據載入後自動替換，數值請勿引用。');
  b.style.cssText='margin:10px 0 2px;padding:10px 14px;border-radius:10px;font-size:13px;background:rgba(208,59,59,.10);border:1px solid rgba(208,59,59,.35);color:var(--ink-1)';
  $('#genline').after(b); }
else if(IND.partial){ const hasSk=IND.pctl_source&&IND.pctl_source.indexOf('快照')>=0;
  const b=el('div',null, hasSk
    ? '📊 全部讀數均為<b>真實值</b>：日度數據（KOFIA，'+fmtD(IND.data_from)+' 起）＋ 5年百分位（'+IND.pctl_source+'，自完整歷史就地計算）。完整歷史檔載入後將補上長期走勢圖。'
    : '📊 <b>真實數據</b>（KOFIA，'+fmtD(IND.data_from)+' 起）。「5年百分位」分項暫以中性值 50 代入，<b>綜合分數為暫估</b>；其餘讀數均為真實值。');
  b.style.cssText='margin:10px 0 2px;padding:10px 14px;border-radius:10px;font-size:13px;background:rgba(42,120,214,.08);border:1px solid rgba(42,120,214,.35);color:var(--ink-1)';
  $('#genline').after(b); }

/* ---------- gauge ---------- */
function gauge(score,zone){
  const w=250,h=150,cx=w/2,cy=135,r=100,r2=86;
  const zones=[[0,25,css('--good')],[25,45,css('--warn')],[45,70,css('--serious')],[70,100,css('--crit')]];
  const a=v=>Math.PI*(1+v/100); // 180°..360°
  const P=(ang,rad)=>[cx+rad*Math.cos(ang), cy+rad*Math.sin(ang)];
  let s='<svg width="'+w+'" height="'+h+'" role="img" aria-label="壓力指數 '+score+'">';
  zones.forEach(([f,t,col])=>{
    const gap=0.014; const a1=a(f)+(f>0?gap:0), a2=a(t)-(t<100?gap:0);
    const [x1,y1]=P(a1,r),[x2,y2]=P(a2,r),[x3,y3]=P(a2,r2),[x4,y4]=P(a1,r2);
    s+='<path d="M'+x1+' '+y1+' A'+r+' '+r+' 0 0 1 '+x2+' '+y2+' L'+x3+' '+y3+' A'+r2+' '+r2+' 0 0 0 '+x4+' '+y4+' Z" fill="'+col+'" opacity="0.9"/>';
  });
  const an=a(Math.max(0,Math.min(100,score)));
  const [nx,ny]=P(an,r2-6);

/* ---------- chart engine ---------- */
const D=IND.dates, S=IND.series;
const RANGES={'6月':126,'1年':252,'3年':756,'5年':1260,'全部':1e9};
let rangeN=252;
function sliceIdx(){ const n=D.length; const from=Math.max(0,n-rangeN); return [from,n]; }
function niceTicks(mn,mx,m=4){ if(mn===mx){mx=mn+1;} const span=mx-mn, step0=span/m,
  mag=Math.pow(10,Math.floor(Math.log10(step0))), cand=[1,2,2.5,5,10].map(x=>x*mag);
  const step=cand.find(c=>span/c<=m)||cand[4]; const lo=Math.floor(mn/step)*step, hi=Math.ceil(mx/step)*step;
  const t=[]; for(let v=lo;v<=hi+1e-9;v+=step)t.push(+v.toFixed(10)); return t; }
const tt=$('#tt');
function showTT(x,y,html){ tt.innerHTML=html; tt.style.display='block';
  const r=tt.getBoundingClientRect(); let px=x+14,py=y+14;
  if(px+r.width>innerWidth-8)px=x-r.width-14; if(py+r.height>innerHeight-8)py=y-r.height-14;
  tt.style.left=px+'px'; tt.style.top=py+'px'; }
function hideTT(){ tt.style.display='none'; }

function chart(host,cfg){
  // cfg: {series:[{name,key|data,color,type:'line'|'area'|'bar'}], yFmt, refLines:[{v,label}], h}
  host.innerHTML='';
  const [i0,i1]=sliceIdx();
  const W=host.clientWidth||520, H=cfg.h||210, pad={l:8,r:8,t:12,b:22};
  const innerW=W-pad.l-pad.r;
  const maxPts=Math.max(80,Math.floor(innerW/2.5));
  const nRaw=i1-i0, stride=Math.max(1,Math.ceil(nRaw/maxPts));
  const idx=[]; for(let i=i0;i<i1;i+=stride)idx.push(i); if(idx[idx.length-1]!==i1-1)idx.push(i1-1);
  const rows=idx.map(i=>({d:D[i],vals:cfg.series.map(s=>(s.data||S[s.key])[i])}));
  let mn=Infinity,mx=-Infinity;
  rows.forEach(r=>r.vals.forEach(v=>{if(v!=null){mn=Math.min(mn,v);mx=Math.max(mx,v);}}));
  (cfg.refLines||[]).forEach(r=>{mn=Math.min(mn,r.v);mx=Math.max(mx,r.v);});
  if(!isFinite(mn)){mn=0;mx=1;}
  if(cfg.zero&&mn>0)mn=0;
  const ticks=niceTicks(mn,mx,4); mn=ticks[0]; mx=ticks[ticks.length-1];
  const tickW=Math.max(...ticks.map(t=>String(cfg.yFmt?cfg.yFmt(t):t).length))*6.6+8;
  const pl=pad.l+tickW, pw=W-pl-pad.r, ph=H-pad.t-pad.b;
  const X=i=>pl+pw*(rows.length===1?0.5:i/(rows.length-1));
  const Y=v=>pad.t+ph*(1-(v-mn)/(mx-mn));
  const NS='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(NS,'svg');
  svg.setAttribute('width',W); svg.setAttribute('height',H); svg.style.display='block';
  const add=(p,t,at)=>{const e=document.createElementNS(NS,t); for(const k in at)e.setAttribute(k,at[k]); p.appendChild(e); return e;};
  // grid + y ticks
  ticks.forEach(t=>{ add(svg,'line',{x1:pl,x2:W-pad.r,y1:Y(t),y2:Y(t),stroke:css('--grid'),'stroke-width':1});
    const tx=add(svg,'text',{x:pl-6,y:Y(t)+3.5,'text-anchor':'end','class':'tick'});
    tx.textContent=cfg.yFmt?cfg.yFmt(t):t; });
  add(svg,'line',{x1:pl,x2:W-pad.r,y1:Y(mn),y2:Y(mn),stroke:css('--axis'),'stroke-width':1});
  // x labels (4)
  const xn=Math.min(4,rows.length); for(let k=0;k<xn;k++){ const i=Math.round(k*(rows.length-1)/(xn-1||1));
    const tx=add(svg,'text',{x:X(i),y:H-6,'text-anchor':k===0?'start':(k===xn-1?'end':'middle'),'class':'tick'});
    tx.textContent=fmtD(rows[i].d).slice(2); }
  // ref lines
  (cfg.refLines||[]).forEach(r=>{ add(svg,'line',{x1:pl,x2:W-pad.r,y1:Y(r.v),y2:Y(r.v),stroke:css('--axis'),'stroke-width':1});
    const tx=add(svg,'text',{x:pl+4,y:Y(r.v)-4,'text-anchor':'start','class':'tick'}); tx.textContent=r.label; });
  // marks
  const surface=css('--surface-1');
  cfg.series.forEach((s,si)=>{
    const col=s.color;
    if(s.type==='bar'){
      const bw=Math.min(24,Math.max(1.5,pw/rows.length-2));
      rows.forEach((r,i)=>{ const v=r.vals[si]; if(v==null)return;
        const y=Y(Math.max(0,v)), y0=Y(Math.max(0,mn)); const hgt=Math.max(1,Math.abs(Y(v)-Y(Math.max(0,mn))));
        const rr=Math.min(4,bw/2);
        add(svg,'path',{d:'M'+(X(i)-bw/2)+' '+(y0)+' V'+(y+rr)+' Q'+(X(i)-bw/2)+' '+y+' '+(X(i)-bw/2+rr)+' '+y+' H'+(X(i)+bw/2-rr)+' Q'+(X(i)+bw/2)+' '+y+' '+(X(i)+bw/2)+' '+(y+rr)+' V'+y0+' Z',fill:col});
      });
    } else {
      let dPath='',started=false;
      rows.forEach((r,i)=>{ const v=r.vals[si]; if(v==null){started=false;return;}
        dPath+=(started?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)+' '; started=true; });
      if(s.type==='area'){ let aP=''; let firstI=null,lastI=null;
        rows.forEach((r,i)=>{const v=r.vals[si]; if(v!=null){if(firstI==null)firstI=i;lastI=i;}});
        if(firstI!=null){ aP=dPath+'L'+X(lastI)+' '+Y(mn)+' L'+X(firstI)+' '+Y(mn)+' Z';
          add(svg,'path',{d:aP,fill:col,opacity:.10}); } }
      add(svg,'path',{d:dPath,fill:'none',stroke:col,'stroke-width':2,'stroke-linecap':'round','stroke-linejoin':'round'});
      const li=rows.length-1, lv=rows[li].vals[si];
      if(lv!=null){ add(svg,'circle',{cx:X(li),cy:Y(lv),r:4.5,fill:col,stroke:surface,'stroke-width':2}); }
    }
  });
  // crosshair + tooltip
  const cross=add(svg,'line',{x1:0,x2:0,y1:pad.t,y2:pad.t+ph,stroke:css('--axis'),'stroke-width':1,opacity:0});
  const hot=add(svg,'rect',{x:pl,y:pad.t,width:pw,height:ph,fill:'transparent'});
  hot.style.cursor='crosshair';
  function near(evX){ const rct=svg.getBoundingClientRect(); const rx=evX-rct.left;
    let best=0,bd=1e9; rows.forEach((r,i)=>{const dd=Math.abs(X(i)-rx); if(dd<bd){bd=dd;best=i;}}); return best; }
  hot.addEventListener('mousemove',e=>{ const i=near(e.clientX); cross.setAttribute('x1',X(i)); cross.setAttribute('x2',X(i)); cross.setAttribute('opacity',1);
    let html='<div class="tt-d">'+fmtD(rows[i].d)+'</div>';
    cfg.series.forEach((s,si)=>{ const v=rows[i].vals[si]; html+='<div class="row"><span class="sw" style="width:9px;height:9px;border-radius:3px;background:'+s.color+'"></span>'+s.name+'<span class="v">'+(v==null?'–':(cfg.yFmt?cfg.yFmt(v):fmtN(v)))+'</span></div>'; });
    showTT(e.clientX,e.clientY,html); });
  hot.addEventListener('mouseleave',()=>{cross.setAttribute('opacity',0);hideTT();});
  host.appendChild(svg);
  // direct end labels (≤3 series, collision-checked)
  if(cfg.series.length>1&&cfg.series.length<=3&&cfg.series.every(s=>s.type!=='bar')){
    const ys=cfg.series.map((s,si)=>{const v=rows[rows.length-1].vals[si];return v==null?null:Y(v);});
    const ok=ys.every((y,i)=>y==null||ys.every((y2,j)=>i===j||y2==null||Math.abs(y-y2)>=13));
    if(ok){ cfg.series.forEach((s,si)=>{ if(ys[si]==null)return;
      const tx=document.createElementNS(NS,'text'); tx.setAttribute('x',W-pad.r); tx.setAttribute('y',ys[si]-8);
      tx.setAttribute('text-anchor','end'); tx.setAttribute('class','dlabel'); tx.textContent=s.name;
      svg.appendChild(tx); }); }
  }
}

  const ev=[]; const d5=E.margin_d5_pct;
  if(IND.mode&&IND.mode.label) ev.push('模式判定——'+IND.mode.label);
  if(d5!=null) ev.push('融資餘額近 5 日 '+(d5>0?'+':'')+fmtN(d5,1)+'%'+(d5<-1?'，降槓桿仍在進行':(d5>1?'，槓桿仍在累積、出清尚未真正開始':'，初現企穩跡象')));
  if(P.bandae_amt!=null) ev.push('斷頭（強制平倉）金額處 5 年第 '+Math.round(P.bandae_amt)+' 百分位'+(P.bandae_amt>=70?'，被動賣壓仍強':(P.bandae_amt<=40?'，斷頭潮已明顯退坡':'，賣壓自高點回落中')));
  if(P.margin_dep!=null) ev.push('融資/預託金比處第 '+Math.round(P.margin_dep)+' 百分位'+(P.margin_dep<=40?'，散戶現金緩衝相對充裕':(P.margin_dep>=70?'，槓桿相對子彈偏緊':'')));
  if(E.deposit_peak&&E.deposit_peak[0]&&IND.latest.deposit!=null){const dp=E.deposit_peak; const chg=100*(IND.latest.deposit/dp[0]-1); if(chg<-10) ev.push('預託金自 '+fmtD(dp[1]).slice(5)+' 高點 '+fmtN(dp[0],0)+' 兆縮至 '+fmtN(IND.latest.deposit,0)+' 兆（'+fmtN(chg,1)+'%），場內現金正在流失');}
  if(P.bandae_amt==null&&E.bandae_peak&&E.bandae_peak[0]&&E.bandae_amt_ma!=null){const bp=E.bandae_peak; ev.push('斷頭金額5日均 '+fmtN(E.bandae_amt_ma,0)+' 億，較 '+fmtD(bp[1]).slice(5)+' 單日高峰 '+fmtN(bp[0],0)+' 億'+(E.bandae_amt_ma<bp[0]*0.4?'明顯回落':'仍處高位'));}
  if(P.rv20!=null&&P.turn_heat!=null) ev.push((P.rv20>60||P.turn_heat>60)?'波動率與成交熱度仍高於歷史均值，市場尚未進入風險釋放後的穩定狀態':'波動率與成交熱度已回落至歷史均值附近，市場漸趨穩定');
  const s2=ev.join('；')+'。';
  const miss=[];
  if(IND.signals.s1.status!=='green') miss.push('①技術性賣壓衰竭（強平與融資降速回落）');
  if(IND.signals.s2.status!=='green') miss.push('②外部催化劑落地（大型雲廠商財報）');
  if(IND.signals.s3.status!=='green') miss.push('③監管干預明朗');
  const s3=miss.length?('市場重新回歸基本面驅動之前，仍待：'+miss.join('、')+'。'):'三項關鍵訊號均已亮綠，基本面重新接手的條件漸備。';

function genVerdict(){
  const C=IND.composite,U=IND.unwind,E=IND.latest_extra,P=E.pctl||{};
  const bp=E.bandae_peak&&E.bandae_peak[0];
  const retreat=bp!=null&&E.bandae_amt_ma!=null&&E.bandae_amt_ma<bp*0.4;
  const stable=E.margin_d5_pct!=null&&E.margin_d5_pct>-1;
  const uPct=(U.U*100).toFixed(0);
  let main;
  if(C.zone==='done'){
    main='槓桿壓力已大致釋放（指數 '+fmtN(C.score,0)+'，出清 '+uPct+'%），市場條件回到基本面驅動。';
  } else if(C.zone==='late'){
    main='去槓桿進入尾聲（指數 '+fmtN(C.score,0)+'，出清 '+uPct+'%）'+(retreat?'，強制賣壓已明顯退潮':'')+'——可以開始關注基本面接手的訊號。';
  } else {
    const stg=IND.stage?['','第一階段（觸發追繳）','第二階段'+(U.U>=0.6?'後期':'')+'（強平主導）','第三階段（企穩回歸）'][IND.stage.n]:null;
    main='去槓桿走到'+(C.zone==='high'?'初中期':'中後期')+(stg?'＝三階段劇本的'+stg:'')+'（指數 '+fmtN(C.score,0)+'，本輪超額槓桿已出清 '+uPct+'%）：'
      +(retreat&&stable?'最兇的強制拋售大概率已經過去':'強制賣壓尚未衰竭')
      +((P.margin_total||0)>=90?'，但槓桿存量仍堆在歷史頂部':'')
      +((P.rv20||0)>=80?'、市場波動仍極端':'')
      +'——出清沒有完成，現階段的反彈屬技術性反彈，不是底部確認。'+(U.U>=0.99&&U.excess_vs_normal>1?'（出清100%僅指本輪新增槓桿；距1月正常水位仍有 '+fmtN(U.excess_vs_normal,1)+' 兆餘量）':'');
  }
  let watch='之後每天只需盯兩條線：<b>斷頭金額</b>與<b>融資餘額</b>——兩條都走平之日，就是出清接近完成之時。';
  if(E.deposit_peak&&E.deposit_peak[0]&&IND.latest.deposit!=null){
    const chg=100*(IND.latest.deposit/E.deposit_peak[0]-1);
    if(chg<-10) watch+=' 另留意：散戶預託金自高點已流失 '+fmtN(-chg,0)+'%，反彈的燃料在變薄。';
  }
  return {main,watch};
}
function renderStages(){
  const box=$('#stages'); if(!IND.stage){box.innerHTML='';return;}

   let t='本輪加槓桿：基期 '+fmtN(U.baseline,1)+' 兆（'+fmtD(U.baseline_date)+'）→ 峰值 '+fmtN(U.peak,1)+' 兆（'+fmtD(U.peak_date)+'），共 +'+fmtN(added,1)+' 兆；現 '+fmtN(U.current,1)+' 兆＝已回吐 '+fmtN(gave,1)+' 兆、尚餘 '+fmtN(U.excess_now,1)+' 兆 → 出清 <b>'+fmtN(U.U*100,0)+'%</b>（'+fmtN(gave,1)+'÷'+fmtN(added,1)+'）'; if(U.normal_base!=null){t+='。<b>另一把尺</b>：距今年1月正常水位 '+fmtN(U.normal_base,1)+' 兆仍高 '+fmtN(U.excess_vs_normal,1)+' 兆——前者量本輪新增槓桿的往返，後者量整個槓桿水位的退潮';} return t;}},
 {id:'md',t:'融資／預託金比（槓桿 vs 現金緩衝）', d:'借的錢 ÷ 帳上現金。比率下降＝散戶現金緩衝相對充裕，槓桿張力比表面溫和。',
  how:'預託金＝散戶放在券商帳戶、還沒買進股票的現金（子彈）。<b>比率下行</b>＝子彈比槓桿長得快，即使融資額創新高、實際張力也沒表面緊——判斷「槓桿是否被高估」的關鍵反向證據；<b>比率上行且預託金同時下滑</b>＝沒子彈還在加槓桿，最脆弱的組合。下方預託金面積圖單獨看：暴跌後預託金反而跳增，常代表「跌出來的錢在場邊等」。',

 {id:'fb',t:'斷頭賣壓（強制平倉）', d:'散戶繳不出保證金時，券商直接砍倉賣出的金額。斷頭單不看價格、不問基本面——「被動賣盤」最純粹的證據。',
  how:'下跌自我強化的引擎就在這裡：股價跌 → 保證金不足 → 券商<b>強制砍倉（斷頭）</b> → 賣壓再壓低股價 → 更多人被斷頭。上圖長條飆高＝斷頭潮正在發生；<b>連續數日回落</b>＝最兇的拋壓大概率已過，正是訊號①「技術性賣壓衰竭」等的畫面。下圖比率回答「欠款的人裡有多大比例被砍」——金額會隨市場規模水漲船高，比率更適合跨期比較。<b>注意時滯</b>：斷頭多於次日開盤執行、統計再約 +1 日——暴跌日的斷頭高峰通常出現在其後 1-2 個交易日的數據中，別看暴跌當天數字小就以為沒事。規模感：截至7/13，全市場約120萬個槓桿帳戶觸及追繳線、其中32-36萬戶遭券商全額強平、本金清零。（韓文原詞 반대매매，台股俗稱「斷頭」）',
  fn:()=>IND.stage&&IND.stage.bandae_mtd!=null?('本月累計斷頭金額 '+fmtN(IND.stage.bandae_mtd,0)+' 億₩（KOFIA 未繳款口徑；券商信用戶強制清算為另一口徑，媒體數字可能略異）'):'',
  series:[{name:'斷頭金額(億₩)',key:'bandae_amt',color:'--s1',type:'bar'}], yFmt:v=>fmtN(v,0), zero:true,
  panel2:{t:'斷頭比率＝斷頭金額 ÷ 散戶未繳款（%，5日均）',series:[{name:'斷頭比率5日均',key:'bandae_ratio_ma',color:'--s6',type:'line'}],yFmt:v=>fmtN(v,1)+'%'}},
 {id:'kx',t:'KOSPI 指數與市場應激', d:'指數走勢＋20日年化已實現波動率（VKOSPI 替代，待 KRX 解鎖後切換）。',
  how:'判讀基準很直接：<b>波動率回到歷史均值（百分位 50）以下之前，市場仍處「主動降槓桿」階段</b>，其間的反彈都屬技術性，不是風險充分釋放後的穩定狀態。指數本身只是背景板——去槓桿分析裡，波動率何時「熄火」比指數點位更重要。<b>估值不是底</b>：本輪動態 PE 已跌至約 6 倍、低於 2008 年金融危機——但高槓桿市場的底部由流動性與強平壓力決定，不由估值決定；估值低是反彈的燃料，不是止跌的理由。',
  series:[{name:'KOSPI',key:'kospi_idx',color:'--s1',type:'line'}], yFmt:v=>fmtN(v,0),
  panel2:{t:'20日年化波動率 %',series:[{name:'已實現波動率',key:'rv20',color:'--s5',type:'line'}],yFmt:v=>fmtN(v,0)+'%'}},
 {id:'tv',t:'成交熱度與融資消化天數', d:'成交活躍度回到歷史均值之前，代表籌碼仍在激烈換手、降槓桿仍在進行。',
  how:'成交額居高＝籌碼仍在激烈換手、多空對決未分勝負；<b>回落至均值</b>＝出清接近完成的佐證之一。下方「消化天數」＝融資餘額 ÷ 日成交額：若融資盤被迫全數了結，市場需要幾天成交量才吞得下——<b>越低越健康</b>，急跌行情中它反而下降（分母放大），是賣壓被市場吸收的跡象。',
  series:[{name:'兩市成交額(兆₩)',key:'turn_val',color:'--s1',type:'bar'}], yFmt:v=>fmtN(v,0), zero:true,
  panel2:{t:'融資餘額／日成交額（天）',series:[{name:'消化天數',key:'margin_val',color:'--s2',type:'line'}],yFmt:v=>fmtN(v,1)}},
];

function cardEl(c){
  const d=el('div','card'); d.id='card-'+c.id;
  const hd=el('div','hd'); const hl=el('div');
  hl.append(el('h3',null,c.t), el('div','desc',c.d));
  if(c.how){ const dt=el('details','how'); dt.innerHTML='<summary>怎麼看這張圖</summary><div class="hb">'+c.how+'</div>'; hl.append(dt); }
  hd.append(hl, el('div','spacer'));
  const tb=el('button','ghost','表格'); tb.onclick=()=>{c.showTable=!c.showTable; tb.textContent=c.showTable?'圖表':'表格'; renderCard(c);};
  hd.append(tb); d.append(hd);
  d.append(el('div',null,'').appendChild(el('div')).parentElement);
  const body=el('div'); body.className='body'; d.append(body);
  if(c.extra==='unwind'){ const u=el('div','unwind');
    u.innerHTML='<div class="bar"><div class="fill" style="width:'+(IND.unwind.U*100).toFixed(0)+'%"></div></div><div class="cap"><span>出清進度 '+(IND.unwind.U*100).toFixed(0)+'%</span><span>剩餘超額 '+fmtN(IND.unwind.excess_now,1)+' 兆₩</span></div>';
    d.append(u); }
  const lg=el('div','legend'); d.append(lg);
  const fn=el('div','fn'); d.append(fn);
  return d;
}
function renderCard(c){
  const card=$('#card-'+c.id), body=card.querySelector('.body'), lg=card.querySelector('.legend'), fn=card.querySelector('.fn');
  body.innerHTML='';
  const mkSeries=arr=>arr.map(s=>({...s,color:css(s.color)}));
  if(c.showTable){
    const [i0,i1]=sliceIdx(); const keys=[...c.series.map(s=>s.key),...(c.panel2?c.panel2.series.map(s=>s.key):[])];
    const names=[...c.series.map(s=>s.name),...(c.panel2?c.panel2.series.map(s=>s.name):[])];
    let h='<div class="tblwrap"><table class="tv"><thead><tr><th>日期</th>'+names.map(x=>'<th>'+x+'</th>').join('')+'</tr></thead><tbody>';
    for(let i=i1-1;i>=i0;i--){ h+='<tr><td>'+fmtD(D[i])+'</td>'+keys.map(k=>'<td>'+(S[k][i]==null?'–':fmtN(S[k][i],2))+'</td>').join('')+'</tr>'; }
    body.innerHTML=h+'</tbody></table></div>'; lg.innerHTML='';
  } else {
    const h1=el('div'); body.append(h1);
    chart(h1,{series:mkSeries(c.series),yFmt:c.yFmt,refLines:c.refs?c.refs():null,zero:c.zero,h:c.panel2?190:230});
    if(c.panel2){ body.append(el('div','desc',c.panel2.t));
      const h2=el('div'); body.append(h2);
      chart(h2,{series:mkSeries(c.panel2.series),yFmt:c.panel2.yFmt,h:120}); }
    const allS=[...c.series,...(c.panel2?c.panel2.series:[])];
    lg.innerHTML=allS.length>1?allS.map(s=>'<span class="key"><span class="'+(s.type==='bar'?'sw':'ln')+'" style="background:'+css(s.color)+'"></span>'+s.name+'</span>').join(''):'';
  }
  fn.innerHTML=c.fn?c.fn():'';
}

/* ETF pending card */
function etfCard(){
  const d=el('div','card'); d.id='card-etf';
  d.append(el('h3',null,'槓桿ETF出清程度（三星電子／SK海力士 單股2倍）'));
  if(IND.etf&&IND.etf.enabled){ /* future: charts injected by pipeline */ }
  else {
    d.append(el('div','desc','關鍵在「份額」而非「規模」：截至7/10，槓桿ETF總規模較高點下降37.8%，但幾乎全來自淨值回落——ETF份額對應資產反而由19.9兆增至26.7兆韓元（+34.5%）＝槓桿倉位根本沒出清，一旦反彈規模將自動回升。風險敞口（規模×倍數）占三星/海力士流通市值1.88%，仍遠高於美國同類約1.1%。'));
    const dt=el('details','how'); dt.innerHTML='<summary>怎麼看這張圖</summary><div class="hb">槓桿 ETF 每日再平衡會「越漲越買、越跌越賣」，規模夠大時足以主導三星電子／SK海力士的定價（極端交易日曾占個股總成交約六成）。屆時看兩個數：<b>AUM 距峰值萎縮幅度</b>＝已釋放的風險；<b>距 4 月底基期的剩餘規模</b>＝還沒退出的槓桿倉。規模停止快速萎縮，是訊號①「技術性賣壓衰竭」成立的必要條件之一。</div>'; d.append(dt);
    d.append(el('div','pending','⏳ 此模組待 KRX Data Marketplace 登入後自動補齊（逐檔規模淨值歷史、跌破發行價家數、再平衡衝擊估算）。目前綜合指數未計入ETF分項（權重已重新歸一）。'));
  }
  return d;
}
/* composite parts card */
function partsCard(){
  const d=el('div','card'); d.append(el('h3',null,'壓力指數分解（各分項貢獻）'));
  d.append(el('div','desc','分項貢獻＝權重 × 標準化讀數；合計＝'+fmtN(IND.composite.score,1)+'。'));
  const dt=el('details','how'); dt.innerHTML='<summary>怎麼看這張圖</summary><div class="hb">回答「壓力主要來自哪裡」：條越長＝該分項越接近其權重上限。寫解讀時點名最長的兩三條——是<b>水位</b>還太高（槓桿存量問題）、<b>出清進度</b>太慢（時間問題）、還是<b>被動賣壓／市場應激</b>正猛（當下強度問題）——敘事重點完全不同。各分項回落的先後順序，通常也是：強平先退坡 → 波動與成交降溫 → 水位百分位最後才下來。</div>'; d.append(dt);
  const box=el('div','parts');
  const parts=IND.composite.parts; const maxW=Math.max(...Object.values(parts),1);
  Object.entries(parts).forEach(([k,v])=>{
    const r=el('div','row');
    r.innerHTML='<div class="nm">'+k+'</div><div class="bar"><div class="bf" style="width:'+(100*v/22).toFixed(1)+'%"></div></div><div class="pv">'+fmtN(v,1)+' 分</div>';
    box.append(r); });
  d.append(box);
  return d;
}

/* ---------- filters ---------- */
Object.keys(RANGES).forEach(k=>{ const b=el('button',null,k); if(RANGES[k]===rangeN)b.classList.add('on');
  b.onclick=()=>{rangeN=RANGES[k]; document.querySelectorAll('.filters button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); renderAll();};
  $('#filters').append(b); });

/* ---------- method ---------- */
function method(){
  const w=IND.config.weights;
  $('#methodBody').innerHTML=
  '<h4>綜合壓力指數（0-100）</h4>四大維度九分項：槓桿水位（融資餘額5年百分位 '+w.lvl_margin_pctl+'、融資/市值 '+w.lvl_mcap_pctl+'、融資/預託金 '+w.lvl_dep_pctl+'）＋出清進度（未出清比例 '+w.unwind_remaining+'、融資5日動能 '+w.momentum+'）＋被動賣壓（斷頭金額 '+w.forced_amt_pctl+'、斷頭比率 '+w.forced_ratio_pctl+'）＋市場應激（波動率 '+w.vol_pctl+'、成交熱度 '+w.turnover_pctl+'）。'+
  '<h4>出清進度 U</h4><code>U =（峰值 − 目前）/（峰值 − 基期）</code>，基期預設 2026/04/30——本輪 AI 行情啟動前的槓桿水位（可於 CONFIG 調整）；U=100% 表示本輪新增槓桿全數退出。'+
  '<h4>數據源與時滯</h4>KOFIA 金融投資協會綜合統計（신용거래융자·투자자예탁금·미수금·반대매매·兩市指數/成交/市值，日度，1998至今）；KRX Data Marketplace（槓桿ETF，待啟用）。波動率以20日已實現波動率年化替代 VKOSPI。<b>回撤口徑</b>：距高點一律以「收盤對收盤」計（KOFIA 僅發布每日收盤指數）；盤中高點通常更高（例如 2026/6/19 盤中一度 9,385 vs 最高收盤 9,114），盤中口徑待 KRX 指數 OHLC 接入後提供切換。<b>公布時滯</b>：指數/成交額為 KRX 當日收盤後入庫；信用融資/預託金/斷頭數據為 KOFIA T+1 公布（實測常於次日下午更新），故信用類截止日通常比行情晚 1-2 個交易日，圖上融資線尾端較指數線短屬正常。'+
  '<h4>訊號判定</h4>①技術性賣壓衰竭＝斷頭金額5日均百分位&lt;50 且 融資5日跌幅&lt;1%（ETF啟用後加入規模萎縮速度）；②③為人工旗標，依新聞更新。'+
  '<h4>韓文術語對照</h4>신용거래융자＝信用融資（散戶向券商借錢買股）；투자자예탁금＝預託金（散戶帳上待投現金）；미수금＝未繳款（散戶欠券商的交割/保證金款項）；반대매매＝斷頭（券商強制平倉賣出）。';
  $('#foot').innerHTML='指標定義與權重可在 compute_indicators.py 的 CONFIG 調整；KOFIA 口徑僅涵蓋場內信用融資（不含槓桿 ETF 內含槓桿、股票質押與場外配資），信用數據為 T+1 公布。';
}

/* ---------- render all ---------- */
function renderAll(){
  gauge(IND.composite.score, IND.composite.zone);
  tiles(); chips(); renderComment();
  const cardsBox=$('#cards');
  if(!cardsBox.dataset.built){ CARDS.forEach(c=>cardsBox.append(cardEl(c))); cardsBox.append(etfCard(),partsCard()); cardsBox.dataset.built=1; }
  CARDS.forEach(renderCard);
  method();
}
renderAll();
let rto; addEventListener('resize',()=>{clearTimeout(rto);rto=setTimeout(renderAll,150);});
})();
